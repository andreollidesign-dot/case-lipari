<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Test Hamburger CON FIX</title>
<style>
:root {
  --color-bianco-calce: #FAF8F3;
  --color-blu-notte: #1C2B3A;
  --color-blu-notte-faint: rgba(28, 43, 58, 0.1);
  --color-ocra-dorata: #C8943A;
  --color-overlay: rgba(28, 43, 58, 0.4);
  --space-2xs: 8px;
  --space-md: 24px;
  --space-xl: 48px;
  --header-height: 64px;
  --transition-fast: 150ms ease;
  --transition-medium: 300ms ease;
  --fs-small: 14px;
  --fs-h3: 22px;
  --fw-regular: 400;
  --fw-medium: 500;
  --ls-label: 0.08em;
  --z-header: 100;
  --z-mobile-menu: 200;
  --container-max: 1280px;
  --container-padding: 24px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: system-ui, sans-serif; color: var(--color-blu-notte); background: #fff; }
a { color: inherit; text-decoration: none; }
button { background: none; border: none; cursor: pointer; font: inherit; color: inherit; }
ul { list-style: none; }

.container {
  width: 100%;
  max-width: var(--container-max);
  margin: 0 auto;
  padding-inline: var(--container-padding);
}

.site-header {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: var(--header-height);
  background-color: var(--color-bianco-calce);
  border-bottom: 1px solid transparent;
  z-index: var(--z-header);
}

.site-header__inner {
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: var(--space-md);
}

.site-header__logo {
  display: flex;
  align-items: center;
  height: 100%;
  font-family: serif;
  font-size: 28px;
  letter-spacing: 0.05em;
}
.site-header__logo .a-ocra { color: var(--color-ocra-dorata); }

/* === NAV DESKTOP === */
.site-nav {
  display: flex;
  align-items: center;
  gap: var(--space-xl);
}

.site-nav__list {
  display: flex;
  align-items: center;
  gap: var(--space-xl);
}

.site-nav__link {
  font-size: var(--fs-small);
  font-weight: var(--fw-medium);
  text-transform: uppercase;
  letter-spacing: var(--ls-label);
  color: var(--color-blu-notte);
  padding-block: var(--space-2xs);
}

/* === HAMBURGER === */
.hamburger {
  display: none;
  width: 44px;
  height: 44px;
  align-items: center;
  justify-content: center;
  position: relative;
}

.hamburger__lines {
  position: relative;
  width: 24px;
  height: 14px;
}
.hamburger__lines span {
  position: absolute;
  left: 0;
  width: 100%;
  height: 1px;
  background-color: var(--color-blu-notte);
  transition: transform var(--transition-medium), opacity var(--transition-fast), top var(--transition-medium);
}
.hamburger__lines span:nth-child(1) { top: 0; }
.hamburger__lines span:nth-child(2) { top: 50%; }
.hamburger__lines span:nth-child(3) { top: 100%; }
.hamburger.is-open .hamburger__lines span:nth-child(1) { top: 50%; transform: rotate(45deg); }
.hamburger.is-open .hamburger__lines span:nth-child(2) { opacity: 0; }
.hamburger.is-open .hamburger__lines span:nth-child(3) { top: 50%; transform: rotate(-45deg); }

/* ========================================================== */
/* === MOBILE DRAWER — VERSIONE CON FIX                    === */
/* === Il drawer è FUORI dall'header (vedi HTML sotto)    === */
/* === e ha z-index ALTO nel contesto root.               === */
/* ========================================================== */
@media (max-width: 900px) {
  .hamburger { display: flex; }

  /* La nav desktop diventa drawer mobile */
  .site-nav {
    position: fixed;
    top: 0; right: 0; bottom: 0;
    width: 100%;
    max-width: 380px;
    background-color: var(--color-bianco-calce);
    border-left: 1px solid var(--color-blu-notte-faint);
    flex-direction: column;
    align-items: flex-start;
    justify-content: flex-start;
    gap: var(--space-xl);
    padding: calc(var(--header-height) + var(--space-xl)) var(--space-xl) var(--space-xl);
    transform: translateX(100%);
    transition: transform var(--transition-medium);
    z-index: 1000;          /* FIX 1: alto in contesto root */
    overflow-y: auto;
  }
  .site-nav.is-open { transform: translateX(0); }

  .site-nav__list { flex-direction: column; align-items: flex-start; gap: var(--space-md); width: 100%; }
  .site-nav__link { font-size: var(--fs-h3); text-transform: none; letter-spacing: 0; padding: 12px 0; display: block; width: 100%; }
}

body.is-menu-open { overflow: hidden; }

.menu-backdrop {
  display: none;
  position: fixed;
  inset: 0;
  background-color: var(--color-overlay);
  z-index: 900;             /* FIX 2: sotto al drawer (1000) */
  opacity: 0;
  transition: opacity var(--transition-medium);
}
@media (max-width: 900px) {
  body.is-menu-open .menu-backdrop {
    display: block;
    opacity: 1;
  }
}

main {
  padding-top: calc(var(--header-height) + 32px);
  min-height: 200vh;
  background: linear-gradient(180deg, #eee, #ccc);
  padding-inline: 24px;
}

#log {
  position: fixed;
  bottom: 8px; left: 8px; right: 8px;
  max-height: 200px; overflow: auto;
  background: rgba(0,0,0,0.85);
  color: #0f0;
  padding: 8px 12px;
  font-family: monospace; font-size: 11px;
  z-index: 9999;
  border-radius: 4px;
}
</style>
</head>
<body>

<header class="site-header">
  <div class="container site-header__inner">
    <a href="#" class="site-header__logo">ZAG<span class="a-ocra">A</span>RA</a>

    <!-- ★ FIX 3: la NAV è stata SPOSTATA FUORI dall'header (vedi sotto)
         Qui dentro lascio solo l'hamburger -->
    <button type="button" class="hamburger" aria-label="Menu" aria-expanded="false" aria-controls="site-nav">
      <span class="hamburger__lines"><span></span><span></span><span></span></span>
    </button>
  </div>
</header>

<!-- ★ FIX 3: NAV come FRATELLO dell'header, non figlio -->
<nav class="site-nav" id="site-nav" aria-label="Main">
  <ul class="site-nav__list">
    <li><a href="#a" class="site-nav__link">Home</a></li>
    <li><a href="#b" class="site-nav__link">Villa Anna</a></li>
    <li><a href="#c" class="site-nav__link">Olivetta</a></li>
    <li><a href="#d" class="site-nav__link">Guida a Lipari</a></li>
    <li><a href="#e" class="site-nav__link">Prenota</a></li>
  </ul>
</nav>

<main>
  <h1>TEST CON FIX</h1>
  <p>Riduci sotto 900px, clicca hamburger, clicca le voci.</p>
  <p>Riquadro verde in basso = log degli eventi.</p>
  <h2 id="a">A</h2><div style="height:300px"></div>
  <h2 id="b">B</h2><div style="height:300px"></div>
</main>

<div id="log">In attesa di click...</div>

<script>
const log = (msg) => {
  const el = document.getElementById('log');
  el.innerHTML = '[' + new Date().toLocaleTimeString() + '] ' + msg + '<br>' + el.innerHTML;
};

const hamburger = document.querySelector('.hamburger');
const nav = document.querySelector('.site-nav');

const backdrop = document.createElement('div');
backdrop.className = 'menu-backdrop';
document.body.appendChild(backdrop);

function toggleMenu(open) {
  const isOpen = open !== undefined ? open : !nav.classList.contains('is-open');
  nav.classList.toggle('is-open', isOpen);
  hamburger.classList.toggle('is-open', isOpen);
  document.body.classList.toggle('is-menu-open', isOpen);
  log('toggleMenu(' + isOpen + ')');
}

hamburger.addEventListener('click', () => toggleMenu());
backdrop.addEventListener('click', () => { log('BACKDROP clicked'); toggleMenu(false); });

nav.querySelectorAll('a').forEach(link => {
  link.addEventListener('click', (e) => {
    log('LINK "' + link.textContent + '" cliccato! FUNZIONA!');
    e.preventDefault();
    toggleMenu(false);
  });
});

log('Test con FIX pronto.');
</script>

</body>
</html>
